# 地图服务配置文件 - 测试环境
Name: mapserver-test
Host: 0.0.0.0
Port: 8080
SignatureSecret: "MapServerSecretKey2026"

# MySQL 数据库配置（测试环境业务数据存储）
MySQL:
  DataSource: "test_user:TestPassword@tcp(127.0.0.1:3306)/map_server_test?charset=utf8mb4&parseTime=true&loc=UTC&timeout=5s&readTimeout=10s&writeTimeout=10s"

# 日志配置（测试环境）
Log:
  Mode: file             # 输出模式：file=落地文件，console=仅控制台
  Path: logs/test        # 日志文件存储路径
  Level: info            # 记录等级
  KeepDays: 14           # 历史日志保留天数
  Compress: true         # 历史日志是否压缩成 gzip 包
